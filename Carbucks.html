<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carbucks Contact Card</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f3d2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: #f8f5ed;
      width: 380px;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      border: 3px solid #0f3d2e;
    }

    .logo {
      font-size: 42px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      color: #0f3d2e;
      font-size: 42px;
      letter-spacing: 2px;
    }

    .tagline {
      color: #2f5b4b;
      margin-top: 8px;
      font-size: 16px;
      font-style: italic;
    }

    .services {
      margin: 24px 0;
      color: #222;
      line-height: 1.8;
      font-size: 16px;
    }

    .contact-name {
      font-size: 34px;
      color: #0f3d2e;
      font-weight: bold;
      margin-top: 10px;
    }

    .phone {
      font-size: 28px;
      font-weight: bold;
      color: #111;
      margin: 8px 0 24px;
    }

    .btn {
      display: block;
      text-decoration: none;
      padding: 16px;
      margin: 12px 0;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .call {
      background: #0f3d2e;
      color: white;
    }

    .whatsapp {
      background: #25D366;
      color: white;
    }

    .btn:hover {
      transform: scale(1.03);
    }

    .footer {
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🚘</div>
    <h1>CARBUCKS</h1>
    <div class="tagline">Driven by Comfort. Powered by Trust.</div>

    <div class="services">
      Corporate Travel • Self Drive Cars<br>
      Wedding Cars • Airport Pickup<br>
      Luxury SUVs • 24×7 Chauffeur Service
    </div>

    <div class="contact-name">KAUSHIK</div>
    <div class="phone">9409169383</div>

    <a class="btn call" href="tel:+919409169383">
      📞 Call Now
    </a>

    <a class="btn whatsapp" href="https://wa.me/919409169383" target="_blank">
      💬 Chat on WhatsApp
    </a>

    <div class="footer">
      Rent • Ride • Repeat
    </div>
  </div>
</body>
</html>
